<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Registration • Inscribe</title>
  <link rel="shortcut icon" href="images/inslogo.jpg" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1:#FFFCE0; --bg-2:#FCF4D7; --bg-3:#FAEDCD; --accent-1:#E7C8A0; --accent-2:#D4A373;
      --beige-strong:#C1835D; --beige-soft:#FFF5D6; --beige-cream:#FFF9E3;
      --gradient-bg: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
      --gradient-primary: linear-gradient(135deg, var(--beige-strong), var(--beige-soft));
      --button-gradient: linear-gradient(135deg, var(--beige-strong), var(--beige-soft));
      --light-text: var(--accent-2); --medium-text: rgba(0,0,0,0.55); --dark-text: rgba(0,0,0,0.85);
    }
    body{margin:0;font-family:'Poppins',sans-serif;background:var(--gradient-bg);color:var(--dark-text);} 
    .wrap{min-height:100vh;display:grid;place-items:center;padding:40px 5%;}
    .card{max-width:900px;width:100%;background:linear-gradient(135deg, rgba(255,255,255,.85), rgba(255,255,255,.75));
          border:1px solid rgba(0,0,0,0.06);box-shadow:0 10px 30px rgba(0,0,0,.06);border-radius:20px;padding:36px; text-align:center;}
    h1{font-family:'Montserrat',sans-serif;margin:0 0 10px;color:#73634F;font-size:2.4rem}
    p{color:var(--medium-text);margin:0 0 20px}
    .cta{display:inline-block;background:var(--button-gradient);color:#fff;text-decoration:none;font-weight:800;
         padding:14px 28px;border-radius:999px;box-shadow:0 10px 20px rgba(0,0,0,.15);}
    .hint{margin-top:14px;font-size:.95rem;color:var(--medium-text)}
    iframe{width:100%;height:70vh;border:0;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.12);}
    /* Modal for 'recruiting soon' */
    .overlay{position:fixed;inset:0;background:rgba(255,249,227,0.95);display:none;align-items:center;justify-content:center;z-index:10;}
    .modal{max-width:520px;width:92%;background:linear-gradient(135deg, rgba(255,255,255,.9), rgba(255,255,255,.85));border:1px solid rgba(0,0,0,0.06);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.12);padding:28px;text-align:center}
    .modal h2{margin:0 0 8px;color:#73634F;font-family:'Montserrat',sans-serif}
    .modal p{margin:0 0 16px}
    .close-btn{display:inline-block;margin-top:6px;padding:10px 18px;border-radius:999px;background:var(--button-gradient);color:#fff;font-weight:800;text-decoration:none}
    
    .spacer{height:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="container">
      <h1>Event Registration</h1>
      <p id="status">There are no active forms right now. When registrations open, the form will appear here.</p>
      <div class="spacer"></div>
      <a id="registrationLink" href="#" class="cta"><i class="fas fa-external-link-alt"></i> Open Form</a>
      <div class="hint">This button opens the form in a new tab when available.</div>
      <div id="embedSlot" style="display:none; margin-top:22px;"></div>
      <div id="soonOverlay" class="overlay" aria-hidden="true">
        <div class="modal">
          <h2>We’re recruiting soon</h2>
          <p>No active registration is available at the moment. Please check back shortly.</p>
          <a href="#" class="close-btn" id="closeSoon">Okay</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function(){
      const a = document.getElementById('registrationLink');
      const slot = document.getElementById('embedSlot');
      const status = document.getElementById('status');
      const overlay = document.getElementById('soonOverlay');
      const closeSoon = document.getElementById('closeSoon');

      function openOverlay(e){ e?.preventDefault(); overlay.style.display='flex'; }
      function closeOverlay(e){ e?.preventDefault(); overlay.style.display='none'; }

      if (a){
        const href = a.getAttribute('href');
        if (href && href !== '#'){
          a.setAttribute('target','_blank');
          status.textContent = 'Registrations are open. You can fill the form below or open it in a new tab.';
          const iframe = document.createElement('iframe');
          iframe.src = href; // auto-embed when link provided
          slot.appendChild(iframe);
          slot.style.display = 'block';
        } else {
          a.addEventListener('click', openOverlay);
        }
      }
      closeSoon?.addEventListener('click', closeOverlay);
      overlay?.addEventListener('click', (e)=>{ if(e.target===overlay) closeOverlay(e); });
    })();
  </script>
</body>
</html>
